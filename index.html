<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASMARKA ENVASADOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #1b5e20;
            --primary-light: #2e7d32;
            --primary-dark: #0a3d0f;
            --secondary: #f9a825;
            --bg: #f4f5f0;
            --surface: #ffffff;
            --biggie: #e62117;
            --text: #1a1a1a;
            --text-muted: #6b7280;
            --border: #e2e5dd;
            --radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            margin: 0;
            background: var(--bg);
            padding-bottom: 90px;
            color: var(--text);
        }

        /* ─── HERO PORTADA ─── */
        .hero {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
        }
        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 30%;
            display: block;
        }
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(10,61,15,0.35) 0%, rgba(10,61,15,0.7) 100%);
        }
        .hero-badge {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            background: var(--primary-dark);
            padding: 10px 16px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-badge span {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 13px;
            color: rgba(255,255,255,0.85);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .hero-badge .dot {
            width: 5px; height: 5px;
            background: var(--secondary);
            border-radius: 50%;
            margin: 0 12px;
            flex-shrink: 0;
        }

        /* ─── TABS ─── */
        .tipo-selector {
            display: flex;
            gap: 0;
            margin: 16px 15px 0;
            background: white;
            border-radius: var(--radius);
            padding: 4px;
            border: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 11px;
            text-align: center;
            border-radius: 9px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
        }
        .tab.active-gen {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(27,94,32,0.35);
        }
        .tab.active-big {
            background: var(--biggie);
            color: white;
            box-shadow: 0 2px 8px rgba(230,33,23,0.35);
        }

        /* ─── MAIN ─── */
        main { padding: 12px 15px; max-width: 600px; margin: auto; }

        /* ─── CARDS ─── */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .card-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
            margin: 0 0 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-title .material-icons { font-size: 14px; }

        label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
            margin-bottom: 5px;
        }

        input[type=text], input[type=number], select {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Barlow', sans-serif;
            font-size: 15px;
            margin-bottom: 12px;
            background: #fafaf8;
            transition: all 0.2s;
            color: var(--text);
            -webkit-appearance: none;
        }
        input[type=text]:focus, input[type=number]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(27,94,32,0.1);
        }

        .input-error { border: 2px solid #d32f2f !important; background-color: #fff8f8 !important; }
        .error-msg { color: #d32f2f; font-size: 10px; font-weight: 600; margin-bottom: 10px; display: block; min-height: 12px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.5px; }

        /* ─── BTN ADD ─── */
        .btn-add {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 13px;
            border-radius: 9px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1.5px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-add:active { transform: scale(0.98); }
        .btn-add .material-icons { font-size: 18px; }

        /* ─── ITEMS CARNE ─── */
        .item-carne {
            border-bottom: 1px solid var(--border);
            padding: 13px 0;
        }
        .item-carne:last-child { border-bottom: none; }
        .item-carne span {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 14px;
            display: block;
            margin-bottom: 9px;
            color: #1a1a1a;
            letter-spacing: 0.3px;
        }
        .precios-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .price-field small {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 3px;
        }
        .price-field input { margin-bottom: 2px; font-size: 14px; padding: 9px 11px; }

        /* ─── BUSCADOR ─── */
        #buscador {
            background: #fafaf8;
            border: 1px solid var(--border);
            margin-bottom: 14px;
        }

        /* ─── FOOTER ─── */
        .footer-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            padding: 10px 15px;
            box-shadow: 0 -2px 16px rgba(0,0,0,0.08);
            box-sizing: border-box;
            z-index: 1001;
            max-width: 600px;
            left: 50%;
            transform: translateX(-50%);
        }
        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            width: 100%;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.15s;
            box-shadow: 0 3px 10px rgba(27,94,32,0.3);
        }
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit .material-icons { font-size: 18px; }

        .hidden { display: none; }

        /* ─── BIGGIE CARD ─── */
        #section-big { border: 2px solid var(--biggie); }
        #section-big label { color: var(--biggie); }
        #section-big .card-title { color: var(--biggie); border-bottom-color: rgba(230,33,23,0.15); }
        #section-big input:focus, #section-big select:focus {
            border-color: var(--biggie);
            box-shadow: 0 0 0 3px rgba(230,33,23,0.1);
        }

        /* ─── NUEVO CORTE ─── */
        .nuevo-corte-item {
            background: #fffbf0;
            border: 2px dashed var(--secondary);
            padding: 14px;
            border-radius: var(--radius);
            margin-top: 10px;
            position: relative;
        }

        /* ─── CUSTOM DROPDOWN ─── */
        .custom-select-wrapper { position: relative; width: 100%; margin-bottom: 12px; }
        .custom-select-display {
            width: 100%; padding: 11px 13px; border: 1px solid var(--border);
            border-radius: 8px; box-sizing: border-box; font-family: 'Barlow', sans-serif;
            font-size: 15px; background: #fafaf8; cursor: pointer; user-select: none;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.2s; color: var(--text);
        }
        .custom-select-display.placeholder { color: #aaa; }
        .custom-select-display .arrow { font-size: 18px; color: #888; pointer-events: none; flex-shrink: 0; }
        .custom-select-dropdown {
            display: none; position: absolute; top: 100%; left: 0; right: 0;
            background: white; border: 1px solid var(--border); border-top: none;
            border-radius: 0 0 10px 10px; z-index: 2000;
            max-height: 260px; overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .custom-select-dropdown.open { display: flex; flex-direction: column; }
        .custom-select-search {
            padding: 10px 13px; border: none; border-bottom: 1px solid var(--border);
            font-family: 'Barlow', sans-serif; font-size: 15px; outline: none;
            width: 100%; box-sizing: border-box; flex-shrink: 0; background: #fafaf8;
        }
        .custom-select-list { overflow-y: auto; flex: 1; }
        .custom-select-option {
            padding: 11px 14px; cursor: pointer; font-family: 'Barlow', sans-serif;
            font-size: 14px; border-bottom: 1px solid #f5f5f5; transition: background 0.1s;
        }
        .custom-select-option:hover { background: #e8f5e9; }
        .custom-select-option.no-result { color: #999; font-style: italic; cursor: default; }
        .custom-select-option.no-result:hover { background: transparent; }

        .n-nombre, .n-marca { text-transform: uppercase; }
    </style>
</head>

    }

    function validarInput(input) {
        const val = input.value;
        const parent = input.closest('.precios-row');
        const isOferta = input.classList.contains('p-ofe') || input.classList.contains('n-precio');
        const errorSpan = input.parentElement.querySelector('.error-msg');
        if (val.length > 0 && (val.length < 5 || val.length > 6)) {
            errorSpan.innerText = "Debe tener 5 o 6 números";
            input.classList.add('input-error');
            return;
        }
        if (parent && isOferta) {
            const regInput = parent.querySelector('.p-reg') || {value: 0};
            const valReg = parseFloat(regInput.value) || 0;
            const valOff = parseFloat(val) || 0;
            if (valOff > 0 && valReg > 0 && valOff > valReg) {
                errorSpan.innerText = "Oferta no puede ser mayor";
                input.classList.add('input-error');
                return;
            }
        }
        errorSpan.innerText = "";
        input.classList.remove('input-error');
    }

        const contCortes = document.getElementById('lista-cortes');

                        <input type="number" inputmode="decimal" class="p-ofe" placeholder="0" oninput="validarInput(this)">
                        <span class="error-msg"></span>
                    </div>
                </div>`;
            contCortes.appendChild(div);
        });
    }

    function filtrar() {
        const t = document.getElementById('buscador').value.toLowerCase();
        document.querySelectorAll('.item-carne').forEach(i => {
            i.style.display = i.querySelector('span').innerText.toLowerCase().includes(t) ? 'block' : 'none';
        });
    }

    async function guardar() {
        const url = "https://script.google.com/macros/s/AKfycbwW_-E1Poz6TUcrE8UjMhjg0edRP3k7Bbh8MUKzr27Tn5ss3NOKES5UNJGE8xsiAtZKUQ/exec";
        const btn = document.getElementById('btn-envio');
        let relevador, local;
        if(modoActual === 'gen') {
            relevador = document.getElementById('relevador_gen').value;
            local = document.getElementById('local_gen').value;
            if (local && !locales_gen.includes(local)) {
                return alert("El local ingresado no es válido. Por favor seleccioná uno de la lista.");
            }
        } else {
            relevador = document.getElementById('relevador_biggie').value;
            local = document.getElementById('local_biggie').value;
        }
        const items = [];
        let hayErrores = false;
        document.querySelectorAll('.error-msg').forEach(span => {
            if(span.innerText !== "") hayErrores = true;
        });
        if(hayErrores) return alert("Corrige los errores en rojo antes de enviar.");
        document.querySelectorAll('.item-carne').forEach(div => {
            const nombre = div.querySelector('span').innerText;
            const valorReg = div.querySelector('.p-reg').value;
            const valorOff = div.querySelector('.p-ofe').value;
            if(valorReg || valorOff) {
                items.push({ corte: nombre, precioReg: valorReg || 0, precioOff: valorOff || 0, esNuevo: false });
            }
        });
        document.querySelectorAll('.nuevo-corte-item').forEach(div => {
            const nom = div.querySelector('.n-nombre').value;
            const pre = div.querySelector('.n-precio').value;
            const mar = div.querySelector('.n-marca').value;
            if(nom && pre) items.push({ corte: nom, precioReg: pre, marca: mar, esNuevo: true });
        });
        if(!relevador || !local || items.length === 0) return alert("Completa Relevador, Local y carga algún precio.");
        btn.disabled = true;
        btn.innerHTML = '<i class="material-icons">hourglass_top</i> ENVIANDO...';
        const categoriaFinal = (modoActual === 'big') ? 'BIGGIE' : 'GENERAL';
        try {
            await fetch(url, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ fecha: new Date().toLocaleString(), relevador, local, categoria: categoriaFinal, items })
            });
            alert("¡Relevamiento enviado con éxito!");
            location.reload();
        } catch(e) {
            alert("Error de envío. Revisa tu conexión.");
            btn.disabled = false;
            btn.innerHTML = '<i class="material-icons">cloud_upload</i> ENVIAR RELEVAMIENTO';
        }
    }

    window.addEventListener('load', inicializarApp);
